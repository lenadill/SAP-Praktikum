<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Clarity - Sign Up</title>
	<link rel="stylesheet" href="../static/css/style.css">
    <script src="../static/js/auth.js"></script>
    <style>
        .signup-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            margin: 50px auto;
        }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 600; color: #1e293b; font-size: 0.95rem; }
        .form-group input { 
            width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; 
            font-size: 1rem; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #6f42c1; outline: none; }
        .btn-primary { 
            width: 100%; padding: 14px; background: #6f42c1; color: white; border: none; 
            border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 1.1rem;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: #5a32a3; transform: translateY(-1px); }
        .domain-badge {
            background: #f1f5f9; color: #475569; padding: 14px; border-radius: 10px;
            border: 1.5px solid #e2e8f0; font-weight: 600; min-width: 120px; text-align: center;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #6f42c1;
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
    </style>
</head>
<body class="login-body" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #f6f8fb 0%, #e9eef5 100%);">
	<div class="signup-card">
        <div style="text-align: center; margin-bottom: 35px;">
            <img src="../assets/pictures/clarity_logo.png" alt="Clarity" style="max-height: 60px; margin-bottom: 15px;">
            <h1 id="signupTitle" style="font-size: 1.75rem; color: #0f172a; letter-spacing: -0.025em;">Join Clarity</h1>
            <p id="signupSubtitle" style="color: #64748b; font-size: 1rem;">Welcome to the financial tracker.</p>
        </div>

        <!-- Loading State -->
        <div id="loadingState" style="display: none; text-align: center; padding: 20px 0;">
            <div class="spinner"></div>
            <p id="loadingText" style="color: #64748b;">Checking your invitation...</p>
        </div>

        <!-- Invite Code Section -->
        <div id="inviteCodeSection" style="display: none;">
            <div style="background: #f0f9ff; border: 1px solid #bae6fd; padding: 15px; border-radius: 10px; margin-bottom: 25px; font-size: 0.9rem; color: #0369a1; text-align: center;">
                <strong>Invite Required</strong><br>Please enter your 8-character code or paste your invite link below.
            </div>
            <form id="inviteForm" method="POST">
                <div class="form-group">
                    <label for="manualInviteCode">Invite Code or Link</label>
                    <input type="text" id="manualInviteCode" placeholder="Paste link or code here..." required style="text-align: center; font-family: inherit;">
                </div>
                <button type="submit" class="btn-primary">Continue</button>
            </form>
            <p id="inviteError" style="color: #dc3545; margin-top: 15px; font-size: 0.9rem; text-align: center; font-weight: 500;"></p>
        </div>

        <!-- Registration Form -->
        <form id="userSignupForm" method="POST" style="display: none;">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe" required autocomplete="name">
            </div>
            
            <div class="form-group">
                <label for="emailPrefix">Business Email</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="text" id="emailPrefix" placeholder="john.doe" required style="flex: 1;" autocomplete="username">
                    <div id="domainSuffix" class="domain-badge">@company.com</div>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
        </form>
        
        <p id="signupError" style="color: #dc3545; margin-top: 20px; font-size: 0.9rem; text-align: center; font-weight: 500;"></p>
        
        <div style="margin-top: 30px; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 20px;">
            <p style="font-size: 0.9rem; color: #64748b;">
                Need to register a company? <a href="/register-company" style="color: #6f42c1; font-weight: 600; text-decoration: none;">Click here</a><br><br>
                Already have an account? <a href="/login" style="color: #6f42c1; font-weight: 600; text-decoration: none;">Log in</a>
            </p>
        </div>
	</div>

	<script>
        const urlParams = new URLSearchParams(window.location.search);
        let companyId = urlParams.get('company_id');
        let companyName = urlParams.get('domain'); 
        let currentDomain = "";
        let inviteCode = urlParams.get('invite_code');
        let userRole = 'admin';

        const inviteSection = document.getElementById('inviteCodeSection');
        const signupForm = document.getElementById('userSignupForm');
        const loadingState = document.getElementById('loadingState');
        const inviteError = document.getElementById('inviteError');
        const codeInput = document.getElementById('manualInviteCode');

        async function setupRegistration(compName, domainSuffixRaw) {
            currentDomain = domainSuffixRaw.toLowerCase().replace(/\s+/g, '-') + (domainSuffixRaw.includes('.') ? '' : '.com');
            document.getElementById('domainSuffix').textContent = `@${currentDomain}`;
            document.getElementById('signupTitle').textContent = `Join ${compName}`;
            document.getElementById('signupSubtitle').textContent = "Complete your employee profile.";
            
            loadingState.style.display = 'none';
            inviteSection.style.display = 'none';
            signupForm.style.display = 'block';
        }

        async function validateCode(code) {
            if (!code || code.length < 4) return;
            
            inviteError.textContent = "";
            loadingState.style.display = 'block';
            inviteSection.style.display = 'none';

            try {
                const res = await fetch(`/api/invites/validate?code=${encodeURIComponent(code)}`);
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);
                
                companyId = data.invite.company_id;
                inviteCode = data.invite.code;
                userRole = 'user';
                
                setupRegistration(data.invite.company_name, data.invite.company_domain);
            } catch (err) {
                loadingState.style.display = 'none';
                inviteSection.style.display = 'block';
                inviteError.textContent = err.message;
                document.getElementById('signupTitle').textContent = "Invalid Invite";
            }
        }

        // Helper: Extract code from potential URL string
        function extractCode(input) {
            try {
                if (input.includes('invite_code=')) {
                    const url = new URL(input.startsWith('http') ? input : 'http://' + input);
                    return url.searchParams.get('invite_code');
                }
            } catch(e) {}
            return input.trim().toUpperCase();
        }

        // Handle Paste or typing full links
        codeInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.includes('invite_code=')) {
                const code = extractCode(val);
                if (code) validateCode(code);
            }
        });

        document.getElementById('inviteForm').addEventListener('submit', (e) => {
            e.preventDefault();
            validateCode(extractCode(codeInput.value));
        });

        // INITIAL ROUTING
        if (inviteCode) {
            validateCode(inviteCode);
        } else if (companyId && companyName) {
            userRole = 'admin';
            setupRegistration(companyName, companyName);
        } else {
            document.getElementById('signupTitle').textContent = "Join your Team";
            inviteSection.style.display = 'block';
        }

        document.getElementById('userSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('signupError');
            errorEl.textContent = "";

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('emailPrefix').value.trim() + "@" + currentDomain;
            const password = document.getElementById('password').value;

            try {
                const userRes = await fetch('/api/users/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        full_name: fullName, 
                        email: email, 
                        password: password, 
                        company_id: companyId,
                        role: userRole,
                        invite_code: userRole === 'user' ? inviteCode : null
                    })
                });
                const userData = await userRes.json();
                if (userData.error) throw new Error(userData.error);

                // Clear any stale auth before going to login
                localStorage.removeItem('clarityAuth');
                localStorage.removeItem('clarityUser');
                
                alert("Account created successfully! Please log in with your new credentials.");
                window.location.href = '/login';

            } catch (err) {
                errorEl.textContent = err.message;
            }
        });
    </script>
</body>
</html>
